<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teacher Panel - College ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page-teacher">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container px-4">
        <a class="navbar-brand fw-bold" href="/">CSE College ERP</a>
        <button class="btn btn-outline-light btn-sm" id="themeToggle">Dark Mode</button>
      </div>
    </nav>

    <main class="container py-5">
      <section class="page-header text-center mb-5">
        <p class="text-primary fw-semibold">Teacher Access</p>
        <h1 class="fw-bold">Teacher Upload & Update Portal</h1>
        <p class="text-muted">Login with your credentials, then upload marks, attendance, syllabus progress, and notices.</p>
      </section>

      <section class="teacher-login card shadow-sm mb-5 p-4 bg-white">
        <h5 class="mb-4">Teacher Login</h5>
        <div class="row g-3 align-items-end">
          <div class="col-md-5">
            <label class="form-label">Email</label>
            <input id="teacherEmail" type="email" class="form-control" placeholder="teacher@example.com" />
          </div>
          <div class="col-md-5">
            <label class="form-label">Password</label>
            <input id="teacherPassword" type="password" class="form-control" placeholder="Enter password" />
          </div>
          <div class="col-md-2 d-grid">
            <button id="teacherLoginButton" class="btn btn-primary">Login</button>
          </div>
        </div>
        <p id="teacherLoginStatus" class="mt-3 text-danger d-none"></p>
      </section>

      <section id="teacherPanel" class="d-none">
        <div class="alert alert-primary rounded-4" id="teacherWelcome"></div>

        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card shadow-sm rounded-4 p-4 bg-white">
              <h5 class="mb-3">Upload Marks</h5>
              <input id="marksFile" type="file" accept=".xlsx,.xls" class="form-control mb-3" />
              <button id="marksUploadButton" class="btn btn-primary w-100">Upload Marks Excel</button>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card shadow-sm rounded-4 p-4 bg-white">
              <h5 class="mb-3">Upload Attendance</h5>
              <input id="attendanceFile" type="file" accept=".xlsx,.xls" class="form-control mb-3" />
              <button id="attendanceUploadButton" class="btn btn-primary w-100">Upload Attendance Excel</button>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card shadow-sm rounded-4 p-4 bg-white">
              <h5 class="mb-3">Upload Syllabus</h5>
              <input id="syllabusFile" type="file" accept=".xlsx,.xls" class="form-control mb-3" />
              <button id="syllabusUploadButton" class="btn btn-primary w-100">Upload Syllabus Excel</button>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card shadow-sm rounded-4 p-4 bg-white">
              <h5 class="mb-3">Upload Notice</h5>
              <input id="noticeTitle" type="text" class="form-control mb-3" placeholder="Notice title" />
              <textarea id="noticeDescription" class="form-control mb-3" rows="4" placeholder="Notice description"></textarea>
              <button id="noticeUploadButton" class="btn btn-primary w-100">Publish Notice</button>
            </div>
          </div>
        </div>

        <div id="teacherUploadStatus" class="mt-4"></div>
      </section>
    </main>

    <footer class="footer bg-white py-4 border-top">
      <div class="container text-center text-muted">
        <small>Teacher panel | College ERP | Upload academic data with Excel</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
